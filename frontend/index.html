<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Civic Intelligence</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 id="tenant-title">Civic Intelligence</h1>
          <p id="tenant-tagline" class="tagline">Ask questions about public records.</p>
        </div>
        <div class="top-actions">
          <button id="admin-link" class="secondary-action hidden" type="button">Admin</button>
          <button id="main-link" class="secondary-action hidden" type="button">Workspace</button>
          <button id="change-key" class="secondary-action" type="button">Change API key</button>
        </div>
      </header>
      <nav class="tabs" aria-label="Panels">
        <button class="tab active" data-panel="conversation">Conversation</button>
        <button class="tab" data-panel="case-file">Case File</button>
      </nav>
      <section class="panels">
        <section id="conversation" class="panel conversation-panel">
          <div id="history" class="history"></div>
          <form id="ask-form" class="ask-form">
            <input id="question" name="question" value="Tell me about parcel P48165" autocomplete="off" required>
            <button type="submit">Ask</button>
            <details class="notify-panel">
              <summary>Notify when complete (optional)</summary>
              <div class="notify-fields">
                <label>
                  <span>Email</span>
                  <input id="notify-email" type="email" autocomplete="email" placeholder="planner@example.gov">
                </label>
                <label>
                  <span>Webhook</span>
                  <input id="notify-webhook" type="url" placeholder="https://webhook.site/...">
                </label>
                <fieldset>
                  <legend>Only notify if confidence is:</legend>
                  <label><input id="conf-high" type="checkbox" checked> High</label>
                  <label><input id="conf-medium" type="checkbox" checked> Medium</label>
                  <label><input id="conf-low" type="checkbox"> Low</label>
                </fieldset>
              </div>
            </details>
          </form>
          <section class="case-history">
            <h2>Recent Cases</h2>
            <div id="case-history-list" class="case-history-list"></div>
          </section>
        </section>
        <section id="case-file" class="panel case-panel">
          <div id="case-content" class="empty-state">No case file loaded.</div>
        </section>
        <section id="admin-panel" class="panel admin-panel">
          <div id="admin-content" class="admin-content"></div>
        </section>
      </section>
    </main>
    <div id="api-key-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="api-key-title">
      <form id="api-key-form" class="modal-box">
        <h2 id="api-key-title">API Key</h2>
        <label>
          <span>Key</span>
          <input id="api-key-input" type="password" autocomplete="off" required>
        </label>
        <button type="submit">Save key</button>
      </form>
    </div>
    <script src="app.js"></script>
  </body>
</html>
