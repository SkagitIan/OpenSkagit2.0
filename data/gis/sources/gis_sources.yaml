# Skagit County GIS source layers.
#
# Each entry describes one downloadable shapefile package (usually a .zip).
# The `sync_gis_sources` management command reads this file, downloads each
# enabled layer, hashes the raw download, and extracts the shapefile into
# data/gis/extracted/<layer_name>/ when the source changes.
#
# This file only configures *where* source files come from. It does not build
# parcel features or import anything into PostGIS.
#
# URLs below are Skagit County's public GIS FTP shapefile exports:
#   https://www.skagitcounty.net/GIS/FtpFiles/Documents/AccessGiS/...
# expected_geometry_type values were confirmed from the actual downloaded
# shapefiles (via pyshp), not assumed, except where noted.
#
# Set `enabled: false` to skip a layer without deleting its config.

layers:
  parcels:
    display_name: "Parcels"
    url: "https://www.skagitcounty.net/GIS/FtpFiles/Documents/AccessGiS/Parcels/parcels-shp.zip"
    enabled: true
    expected_geometry_type: "Polygon"
    refresh_frequency: "weekly"

  parcel_numbers:
    display_name: "Parcel Numbers"
    url: "https://www.skagitcounty.net/GIS/FtpFiles/Documents/AccessGiS/Parcels/PNumbers-shp.zip"
    enabled: true
    expected_geometry_type: "Point"
    refresh_frequency: "weekly"

