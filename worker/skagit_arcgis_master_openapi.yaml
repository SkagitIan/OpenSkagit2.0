      in: path
      required: true
      description: Numeric ArcGIS layer or table id from the generated catalog.
      schema:
        type: integer
        minimum: 0
    format:
      name: f
      in: query
      description: ArcGIS response format. Use json for GPT actions; geojson can be useful for map clients when supported.
      schema:
        type: string
        enum: [json, pjson, geojson]
        default: json
