openapi: 3.1.0
info:
  title: Skagit County ArcGIS REST Master Action
  version: 1.0.0
  description: >
    Read-only Custom GPT action schema for querying Skagit County ArcGIS REST
    services directly. Pair this schema with the generated layer catalog in
    SKAGIT_ARCGIS_CUSTOM_GPT_TECH_DOC.md so the GPT can select the correct
    folder, service, layer id, fields, and query style.
servers:
  - url: https://gis.skagitcountywa.gov/arcgis/rest/services
paths:
  /:
    get:
      operationId: listRoot
      summary: List ArcGIS REST root folders
      description: Returns the Skagit County ArcGIS REST root directory metadata.
      parameters:
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: ArcGIS root metadata.
  /{folder}:
    get:
      operationId: listFolderServices
      summary: List services in a folder
      description: Lists services available inside a Skagit County ArcGIS REST folder.
      parameters:
        - $ref: '#/components/parameters/folder'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: Folder metadata and services.
  /{folder}/{service}/{serverType}:
    get:
      operationId: getServiceMetadata
      summary: Get service metadata
      description: Returns service-level metadata, including layers, tables, capabilities, supported formats, and spatial reference.
      parameters:
        - $ref: '#/components/parameters/folder'
        - $ref: '#/components/parameters/service'
        - $ref: '#/components/parameters/serverType'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: ArcGIS service metadata.
  /{folder}/{service}/{serverType}/layers:
    get:
      operationId: getAllLayersAndTables
      summary: Get all layers and tables for a service
      description: Returns the ArcGIS all-layers metadata page for a MapServer or FeatureServer.
      parameters:
        - $ref: '#/components/parameters/folder'
        - $ref: '#/components/parameters/service'
        - $ref: '#/components/parameters/serverType'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: All layers and tables metadata.
  /{folder}/{service}/{serverType}/{layerId}:
    get:
      operationId: getLayerMetadata
      summary: Get individual layer or table metadata
      description: Returns fields, geometry type, extents, query capabilities, domains, and display metadata for one layer/table.
      parameters:
        - $ref: '#/components/parameters/folder'
        - $ref: '#/components/parameters/service'
        - $ref: '#/components/parameters/serverType'
        - $ref: '#/components/parameters/layerId'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: Layer or table metadata.
  /{folder}/{service}/{serverType}/{layerId}/query:
    get:
      operationId: queryLayer
      summary: Query any Skagit County ArcGIS layer or table
      description: >
        Executes an ArcGIS REST query against discovered MapServer or
        FeatureServer layers/tables. Use the generated layer catalog to select
        folder, service, serverType, layerId, field names, and query patterns.
        Prefer narrow outFields, returnGeometry=false, and resultRecordCount
        unless the user explicitly asks for geometry/map output.
      parameters:
        - $ref: '#/components/parameters/folder'
        - $ref: '#/components/parameters/service'
        - $ref: '#/components/parameters/serverType'
        - $ref: '#/components/parameters/layerId'
        - name: where
          in: query
          description: Standardized ArcGIS SQL where clause. Use exact field names from layer metadata. Default to 1=1 only for counts, metadata checks, or tiny result samples.
          schema:
            type: string
            default: "1=1"
        - name: objectIds
          in: query
          description: Comma-separated Object IDs to fetch directly.
          schema:
            type: string
        - name: outFields
          in: query
          description: Comma-separated fields to return. Use only fields needed for the answer; use * only for debugging or when the user requests all attributes.
          schema:
            type: string
            default: "*"
        - name: returnGeometry
          in: query
          description: Whether to return geometry. Keep false for normal attribute answers; set true for map links, coordinates, intersections, or spatial follow-up work.
          schema:
            type: boolean
            default: false
        - name: geometry
          in: query
          description: ArcGIS geometry JSON or simple envelope/point syntax for spatial queries.
          schema:
            type: string
        - name: geometryType
          in: query
          description: Type of geometry parameter.
          schema:
            type: string
            enum: [esriGeometryPoint, esriGeometryMultipoint, esriGeometryPolyline, esriGeometryPolygon, esriGeometryEnvelope]
        - name: inSR
          in: query
          description: Input spatial reference WKID for geometry, commonly 4326, 3857, 102100, 2285, or 102748 depending on the source.
          schema:
            type: string
        - name: spatialRel
          in: query
          description: Spatial relationship for geometry queries.
          schema:
            type: string
            enum: [esriSpatialRelIntersects, esriSpatialRelContains, esriSpatialRelWithin, esriSpatialRelTouches, esriSpatialRelOverlaps, esriSpatialRelCrosses, esriSpatialRelEnvelopeIntersects, esriSpatialRelIndexIntersects]
            default: esriSpatialRelIntersects
        - name: outSR
          in: query
          description: Output spatial reference WKID. Use 4326 for mobile-friendly longitude/latitude output.
          schema:
            type: string
        - name: returnCountOnly
          in: query
          description: Return only the count of matching records.
          schema:
            type: boolean
            default: false
        - name: returnIdsOnly
          in: query
          description: Return only matching Object IDs. Useful for paging past maxRecordCount.
          schema:
            type: boolean
            default: false
        - name: returnExtentOnly
          in: query
          description: Return only the result extent.
          schema:
            type: boolean
            default: false
        - name: orderByFields
          in: query
          description: Comma-separated order by expressions, for example NAME ASC.
          schema:
            type: string
        - name: groupByFieldsForStatistics
          in: query
          description: Fields to group statistics by.
          schema:
            type: string
        - name: outStatistics
          in: query
          description: ArcGIS JSON statistics expression string.
          schema:
            type: string
        - name: resultOffset
          in: query
          description: Pagination offset for advanced-query layers.
          schema:
            type: integer
            minimum: 0
        - name: resultRecordCount
          in: query
          description: Maximum records to return. Use small values for mobile answers.
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 25
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: ArcGIS feature set, IDs, count, or extent.
  /{folder}/{service}/{serverType}/find:
    get:
      operationId: findInMapService
      summary: Search text across fields in a MapServer
      description: MapServer find operation for text search across one or more layers. Use when the user gives a loose name/address and the exact field is unknown.
      parameters:
        - $ref: '#/components/parameters/folder'
        - $ref: '#/components/parameters/service'
        - $ref: '#/components/parameters/serverType'
        - name: searchText
          in: query
          required: true
          description: Text to search for.
          schema:
            type: string
        - name: contains
          in: query
          description: Whether searchText can match partial field values.
          schema:
            type: boolean
            default: true
        - name: searchFields
          in: query
          description: Optional comma-separated fields to search.
          schema:
            type: string
        - name: layers
          in: query
          description: Optional comma-separated layer ids to search.
          schema:
            type: string
        - name: returnGeometry
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: MapServer find results.
