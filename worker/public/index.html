<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skagit Property Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-2">Skagit Property Agent</h1>
    <p class="text-slate-400 mb-6">Search by address or parcel number. Returns the agent context packet for verification.</p>

    <form id="form" class="flex gap-2 mb-3">
      <input id="q" class="flex-1 rounded-lg px-4 py-3 text-slate-950" placeholder="320 Orange or P72063" />
      <button class="rounded-lg bg-white text-slate-950 px-5 py-3 font-semibold">Search</button>
    </form>

    <div id="results" class="space-y-2 mb-6"></div>
    <pre id="out" class="bg-slate-900 border border-slate-800 rounded-xl p-4 overflow-auto text-sm min-h-96"></pre>
  </main>

  <script>
    const form = document.querySelector('#form');
    const qInput = document.querySelector('#q');
    const results = document.querySelector('#results');
    const out = document.querySelector('#out');

    async function loadParcel(parcel) {
      out.textContent = `Loading ${parcel}...`;
      const res = await fetch(`/api/context?parcel=${encodeURIComponent(parcel)}`);
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    }

    function renderResults(items) {
      results.innerHTML = '';
      for (const item of items) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'w-full text-left rounded-lg bg-slate-900 border border-slate-800 p-3 hover:bg-slate-800';
        btn.innerHTML = `<div class="font-semibold">${item.label}</div><div class="text-sm text-slate-400">${item.parcel}</div>`;
        btn.addEventListener('click', () => loadParcel(item.parcel));
        results.appendChild(btn);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = qInput.value.trim();
      if (!q) return;

      results.innerHTML = '';
      out.textContent = 'Searching...';

      if (/^P\d+$/i.test(q)) {
        await loadParcel(q.toUpperCase());
        return;
      }

      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (data.error) {
        out.textContent = JSON.stringify(data, null, 2);
        return;
      }

      renderResults(data.results || []);
      out.textContent = data.results?.length
        ? 'Pick an address above.'
        : 'No address matches found.';

      if (data.results?.length === 1) await loadParcel(data.results[0].parcel);
    });
  </script>
</body>
</html>
