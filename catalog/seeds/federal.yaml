sources:
  federal_fema_nfhl:
    name: "FEMA National Flood Hazard Layer"
    type: arcgis_rest
    base_url: "https://hazards.fema.gov/gis/nfhl/rest/services/public/NFHL/MapServer"
    domains:
      - flood
      - flood_zone
      - fema
      - hazard
    supports:
      - query_by_geometry
      - query_by_attribute
    config:
      layer_id: 28
      zone_field: "FLD_ZONE"
      description_field: "ZONE_SUBTY"
      in_sr: 102748
      status: "needs_verification"
      note: "Supersedes skagit_flood for federal flood data. Last checked 2026-05-05: endpoint returned 404."

  federal_usaspending:
    name: "USASpending.gov"
    type: rest_api
    base_url: "https://api.usaspending.gov/api/v2"
    domains:
      - federal_spending
      - contracts
      - grants
      - awards
    supports:
      - query_by_recipient
      - query_by_location
      - query_by_cfda
    config:
      awards_endpoint: "/search/spending_by_award/"
      geo_endpoint: "/search/spending_by_geography/"
      requires_auth: false

  federal_sam:
    name: "SAM.gov Entity Registry"
    type: rest_api
    base_url: "https://api.sam.gov/entity-information/v3"
    domains:
      - federal_contractors
      - entity_registration
      - business
    supports:
      - query_by_name
      - query_by_uei
      - query_by_cage
    config:
      entity_endpoint: "/entities"
      requires_auth: true
      auth_type: "api_key"
      auth_header: "X-Api-Key"
      note: "Requires SAM_API_KEY env var. Free registration at sam.gov."
