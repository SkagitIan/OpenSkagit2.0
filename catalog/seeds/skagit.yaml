sources:
  skagit_parcels:
    name: "Skagit County Parcels"
    type: arcgis_rest
    base_url: "https://gis.skagitcountywa.gov/arcgis/rest/services/Assessor/PropertyMap/MapServer"
    domains:
      - parcels
      - assessor
      - ownership
    supports:
      - query_by_parcel
      - query_by_address
      - query_by_geometry
    config:
      layer_id: 5
      parcel_field: "PARCELID"
      owner_field: "OwnerName"
      address_field: "SitusStName"
      in_sr: 102748

  skagit_zoning:
    name: "Skagit County Zoning"
    type: arcgis_rest
    base_url: "https://gis.skagitcountywa.gov/arcgis/rest/services/Geocortex/ZoningLandUsePermits/MapServer"
    domains:
      - zoning
      - planning
      - land_use
    supports:
      - query_by_geometry
      - query_by_parcel
    config:
      layer_id: 8
      zone_field: "ZONING_CODE"
      description_field: "ZONING_LABEL"
      in_sr: 102748

  skagit_flood:
    name: "Skagit County Flood Zones"
    type: arcgis_rest
    base_url: "https://hazards.fema.gov/gis/nfhl/rest/services/public/NFHL/MapServer"
    domains:
      - flood
      - hazard
      - fema
    supports:
      - query_by_geometry
    config:
      layer_id: 28
      zone_field: "FLD_ZONE"
      description_field: "ZONE_SUBTY"
      in_sr: 102748
