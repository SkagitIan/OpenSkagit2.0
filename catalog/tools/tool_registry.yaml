# Tool Registry - Civic Intelligence Platform
# Each tool is a Cloudflare Worker registered here.
# The planner checks this registry before assembling a plan.
# If a tool matches the question's intent, it is dispatched instead of
# or in addition to the standard evidence assembly flow.

tools:
  - id: notify
    name: "Case File Notification"
    type: notification
    runtime: async
    worker_url_env: NOTIFY_WORKER_URL
    triggers:
      - "notify"
      - "send to"
      - "email me"
      - "alert me"
      - "send results to"
      - "forward to"
    input_domains: []
    output_format: notification_receipt
    description: >
      Sends a completed case file to an email address or webhook endpoint.
      Fires after the answer is generated. Does not affect the answer content.
      Supports confidence filtering: only notify if confidence meets a threshold.
    channels_supported:
      - email
      - webhook
    config:
      email_provider: resend
      email_from: "Civic Intelligence <notifications@yourdomain.com>"
      webhook_timeout_seconds: 10

# Tool schema reference:
#
# - id: string, unique snake_case identifier
#   name: string, human-readable
#   type: notification | analysis | report | dashboard
#   runtime: sync | async
#   worker_url_env: string, env var name holding the Worker URL
#   triggers:
#     - list of keywords/phrases that route to this tool
#   input_domains:
#     - list of source domains this tool requires
#   output_format: case_file | report | dataset | chart_data | notification_receipt
#   description: string
#
# Example (not active):
#
