<header class="taxshift-nav{% if report_nav %} taxshift-nav--report{% endif %}">
  <a href="{% url 'tax_home' %}" class="taxshift-brand" aria-label="taxshift home">
    <span class="taxshift-brand__mark" aria-hidden="true">
      <svg viewBox="0 0 36 36" width="36" height="36" role="img">
        <path d="M4 17 18 5l14 12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 16v15h8V21h5v10h5V16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M27 5v7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </span>
    <span>taxshift</span>
  </a>
  <nav class="taxshift-nav__links" aria-label="Site navigation">
    <a class="taxshift-nav__secondary" href="{% url 'tax_home' %}#how-it-works">How it works</a>
    <a class="taxshift-nav__secondary" href="{% url 'tax_data_sources' %}">Data sources</a>
    <a class="taxshift-nav__secondary" href="{% url 'tax_contact' %}">Contact</a>
    {% if request.user.is_staff %}
      <a class="taxshift-nav__secondary" href="{% url 'tax_staff_dashboard' %}">Dashboard</a>
    {% endif %}
    <a class="taxshift-nav__resume" href="#" data-taxshift-last-parcel hidden>Return to parcel</a>
    {% if request.user.is_authenticated %}
      <a href="{% url 'tax_account' %}">Account</a>
    {% else %}
      <a href="{% url 'tax_login' %}">Log in</a>
    {% endif %}
    <a class="taxshift-nav__cta" href="{% url 'tax_home' %}#snapshot">Free search</a>
  </nav>
</header>
<script>
(function () {
  const storageKey = 'taxshift:lastParcel';

  function readLastParcel() {
    try {
      return JSON.parse(window.localStorage.getItem(storageKey) || 'null');
    } catch (error) {
      return null;
    }
  }

  function writeLastParcel(source) {
    if (!source || !source.dataset.parcelNumber || !source.dataset.parcelUrl) return;
    const parcel = {
      parcelNumber: source.dataset.parcelNumber,
      address: source.dataset.parcelAddress || '',
      url: source.dataset.parcelUrl
    };
    try {
      window.localStorage.setItem(storageKey, JSON.stringify(parcel));
    } catch (error) {
      return;
    }
    renderLastParcel(parcel);
  }

  function renderLastParcel(parcel) {
    const link = document.querySelector('[data-taxshift-last-parcel]');
    if (!link) return;
    if (!parcel || !parcel.parcelNumber || !parcel.url) {
      link.hidden = true;
      return;
    }
    link.href = parcel.url;
    link.textContent = 'Return to parcel ' + parcel.parcelNumber;
    link.title = parcel.address ? 'Return to ' + parcel.address : 'Return to parcel ' + parcel.parcelNumber;
    link.hidden = false;
  }

  function rememberCurrentParcel() {
    writeLastParcel(document.querySelector('[data-taxshift-current-parcel]'));
  }

  document.addEventListener('click', function (event) {
    writeLastParcel(event.target.closest('[data-taxshift-parcel-option]'));
  });
  document.addEventListener('DOMContentLoaded', function () {
    rememberCurrentParcel();
    renderLastParcel(readLastParcel());
  });
  document.body.addEventListener('htmx:afterSwap', function () {
    rememberCurrentParcel();
  });
})();
</script>
